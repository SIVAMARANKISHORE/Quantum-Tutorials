<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Calculator</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(-45deg,#1d2671,#c33764,#00c9ff,#92fe9d);
    background-size:400% 400%;
    animation:gradient 12s ease infinite;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.calculator{

    width:380px;
    padding:28px;
    border-radius:28px;

    background:rgba(255,255,255,.15);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.25);

    box-shadow:
    0 25px 50px rgba(0,0,0,.35),
    inset 0 1px 1px rgba(255,255,255,.2);

}

.title{
    text-align:center;
    color:white;
    font-size:28px;
    font-weight:700;
    margin-bottom:20px;
    letter-spacing:1px;
}

.display{

    width:100%;
    height:90px;

    border:none;
    outline:none;

    border-radius:18px;

    background:rgba(255,255,255,.18);

    color:white;

    text-align:right;

    padding:20px;

    font-size:38px;

    font-weight:600;

    box-shadow:inset 0 0 10px rgba(255,255,255,.15);

}

.buttons{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:15px;

    margin-top:25px;

}

button{

    height:70px;

    border:none;

    border-radius:18px;

    font-size:24px;

    font-weight:600;

    cursor:pointer;

    color:white;

    transition:.25s;

    background:rgba(255,255,255,.12);

    box-shadow:
    0 6px 12px rgba(0,0,0,.2);

}

button:hover{

    transform:translateY(-4px);

    background:rgba(255,255,255,.22);

}

button:active{

    transform:scale(.95);

}

.operator{

    background:#ff9800;

}

.operator:hover{

    background:#ffb74d;

}

.equal{

    background:#00c853;

}

.equal:hover{

    background:#00e676;

}

.clear{

    background:#e53935;

}

.clear:hover{

    background:#ef5350;

}

.delete{

    background:#5e35b1;

}

.delete:hover{

    background:#7e57c2;

}

.zero{

    grid-column:span 2;

}

.footer{

    text-align:center;

    margin-top:20px;

    color:white;

    font-size:14px;

    opacity:.8;

}

</style>
</head>

<body>

<div class="calculator">

<div class="title">
Professional Calculator
</div>

<input
type="text"
id="display"
class="display"
placeholder="0"
readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>

<button class="delete" onclick="backspace()">⌫</button>

<button class="operator" onclick="append('%')">%</button>

<button class="operator" onclick="append('/')">÷</button>

<button onclick="append('7')">7</button>

<button onclick="append('8')">8</button>

<button onclick="append('9')">9</button>

<button class="operator" onclick="append('*')">×</button>

<button onclick="append('4')">4</button>

<button onclick="append('5')">5</button>

<button onclick="append('6')">6</button>

<button class="operator" onclick="append('-')">−</button>

<button onclick="append('1')">1</button>

<button onclick="append('2')">2</button>

<button onclick="append('3')">3</button>

<button class="operator" onclick="append('+')">+</button>

<button class="zero" onclick="append('0')">0</button>

<button onclick="append('.')">.</button>

<button class="equal" onclick="calculate()">=</button>

</div>

<div class="footer">
Designed with ❤️ Using HTML • CSS • JavaScript
</div>

</div>

<script>

const display=document.getElementById("display");

function append(value){

display.value+=value;

}

function clearDisplay(){

display.value="";

}

function backspace(){

display.value=display.value.slice(0,-1);

}

function calculate(){

try{

display.value=eval(display.value);

}

catch{

display.value="Error";

}

}

document.addEventListener("keydown",function(e){

if(!isNaN(e.key) || "+-*/.%".includes(e.key))
append(e.key);

else if(e.key==="Enter")
calculate();

else if(e.key==="Backspace")
backspace();

else if(e.key==="Escape")
clearDisplay();

});

</script>

</body>
</html>
