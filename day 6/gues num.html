<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Guess The Number Game</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* Background Image */
    background:url("https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=1600&q=80") no-repeat center center/cover;

    overflow:hidden;
}

/* Dark Overlay */

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
}

/* Game Card */

.container{
    position:relative;
    width:420px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.3);
    border-radius:20px;
    padding:35px;
    text-align:center;
    color:#fff;
    box-shadow:0 15px 35px rgba(0,0,0,.4);
}

h1{
    margin-bottom:10px;
    font-size:34px;
}

.subtitle{
    color:#ddd;
    margin-bottom:25px;
}

/* Number Circle */

.circle{
    width:100px;
    height:100px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(45deg,#00e5ff,#2979ff);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    font-weight:bold;
    margin-bottom:25px;
    box-shadow:0 0 20px cyan;
}

/* Input */

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:18px;
    outline:none;
    margin-bottom:18px;
}

/* Button */

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
    font-weight:600;
}

button:hover{
    background:#00a843;
    transform:scale(1.03);
}

/* Restart */

.restart{
    background:#ff9800;
    margin-top:10px;
}

.restart:hover{
    background:#f57c00;
}

/* Message */

#message{
    margin-top:20px;
    font-size:20px;
    font-weight:600;
    min-height:30px;
}

/* Stats */

.stats{
    display:flex;
    justify-content:space-between;
    margin-top:25px;
}

.box{
    width:31%;
    background:rgba(255,255,255,.15);
    padding:15px;
    border-radius:12px;
}

.box h2{
    font-size:28px;
}

.box p{
    color:#ddd;
    margin-top:5px;
}

/* Responsive */

@media(max-width:500px){

.container{
    width:92%;
}

.stats{
    flex-direction:column;
    gap:12px;
}

.box{
    width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<h1>🎯 Guess The Number</h1>

<p class="subtitle">Guess a number between <b>1 and 100</b></p>

<div class="circle" id="circle">?</div>

<input type="number" id="guess" placeholder="Enter your guess">

<button onclick="checkGuess()">Submit Guess</button>

<button class="restart" onclick="restartGame()">Restart Game</button>

<div id="message">Good Luck! 🍀</div>

<div class="stats">

<div class="box">
<h2 id="attempts">10</h2>
<p>Attempts</p>
</div>

<div class="box">
<h2 id="score">100</h2>
<p>Score</p>
</div>

<div class="box">
<h2>1-100</h2>
<p>Range</p>
</div>

</div>

</div>

<script>

let secretNumber=Math.floor(Math.random()*100)+1;

let attempts=10;
let score=100;

function checkGuess(){

let guess=Number(document.getElementById("guess").value);

let message=document.getElementById("message");

if(!guess || guess<1 || guess>100){

message.style.color="yellow";
message.innerHTML="⚠ Enter a number between 1 and 100";
return;

}

attempts--;
score-=10;

document.getElementById("attempts").innerHTML=attempts;
document.getElementById("score").innerHTML=Math.max(score,0);

if(guess===secretNumber){

message.style.color="#00ff66";
message.innerHTML="🎉 Congratulations! You Won!";

document.getElementById("circle").innerHTML=secretNumber;

document.getElementById("guess").disabled=true;

}

else if(attempts===0){

message.style.color="red";
message.innerHTML="😢 Game Over! Number was "+secretNumber;

document.getElementById("circle").innerHTML=secretNumber;

document.getElementById("guess").disabled=true;

}

else if(guess<secretNumber){

message.style.color="#00e5ff";
message.innerHTML="⬆ Too Low! Try Again";

}

else{

message.style.color="#ffeb3b";
message.innerHTML="⬇ Too High! Try Again";

}

document.getElementById("guess").value="";

}

function restartGame(){

secretNumber=Math.floor(Math.random()*100)+1;

attempts=10;
score=100;

document.getElementById("attempts").innerHTML=attempts;
document.getElementById("score").innerHTML=score;

document.getElementById("circle").innerHTML="?";

document.getElementById("message").innerHTML="Good Luck! 🍀";
document.getElementById("message").style.color="white";

document.getElementById("guess").value="";
document.getElementById("guess").disabled=false;

}

</script>

</body>
</html>
